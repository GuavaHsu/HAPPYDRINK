<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HAPPYDRINK</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes bubble { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    html { height: 100%; }
    body { background: linear-gradient(to right, #fffbeb 0%, #fef3c7 50%, #fde68a 100%) fixed; background-size: cover; margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; min-height: 100%; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .bubble { position: fixed; bottom: -30px; background: rgba(245, 158, 11, 0.25); border-radius: 50%; animation: bubble linear infinite; z-index: 0; pointer-events: none; }
    .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
    .drink-card, .user-card { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .drink-card.active, .user-card.active { transform: scale(1.05); background-color: #f59e0b !important; border: 3px solid #78350f !important; box-shadow: 0 15px 20px -5px rgba(245, 158, 11, 0.4); }
    input, button, textarea { -webkit-appearance: none; outline: none !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    .calendar-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // --- 圖示組件 ---
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const icons = {
        Calendar: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ),
        User: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> ),
        Plus: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> ),
        Minus: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line></svg> ),
        Check: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg> ),
        ChevronLeft: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg> ),
        ChevronRight: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg> ),
        Loader: ( <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg> )
      };
      return icons[name] || null;
    };

    const BubbleBg = () => {
      const bubbles = React.useMemo(() => [...Array(15)].map((_, i) => ({ id: i, left: `${Math.random() * 100}%`, size: `${Math.random() * 20 + 8}px`, duration: `${Math.random() * 4 + 6}s`, delay: `${Math.random() * 5}s` })), []);
      return ( <div className="fixed inset-0 overflow-hidden z-0 pointer-events-none font-black">{bubbles.map(b => ( <div key={b.id} className="bubble" style={{ left: b.left, width: b.size, height: b.size, animationDuration: b.duration, animationDelay: b.delay }} /> ))}</div> );
    };

    const CustomCalendar = ({ selectedDate, onSelect, onClose }) => {
      const dateObj = new Date(selectedDate);
      const [viewDate, setViewDate] = React.useState(new Date(dateObj.getFullYear(), dateObj.getMonth(), 1));
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const prevMonth = () => setViewDate(new Date(year, month - 1, 1));
      const nextMonth = () => setViewDate(new Date(year, month + 1, 1));
      const days = [];
      for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);
      const isSelected = (d) => d === dateObj.getDate() && month === dateObj.getMonth() && year === dateObj.getFullYear();
      const isToday = (d) => { const today = new Date(); return d === today.getDate() && month === today.getMonth() && year === today.getFullYear(); };

      return (
        <React.Fragment>
          <div className="fixed inset-0 z-[90] cursor-default" onClick={onClose}></div>
          <div className="absolute top-0 left-0 w-full z-[100] bg-white rounded-[2.5rem] overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.3)] animate-[slideDown_0.3s_ease-out] border-4 border-amber-900 font-black" onClick={e => e.stopPropagation()}>
            <div className="bg-amber-900 p-3.5 text-white flex justify-between items-center px-6">
              <button type="button" onClick={prevMonth} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronLeft" className="w-5 h-5" /></button>
              <h3 className="text-xl tracking-widest">{year}年 {month + 1}月</h3>
              <button type="button" onClick={nextMonth} className="p-2 hover:bg-white/10 rounded-full cursor-pointer"><Icon name="ChevronRight" className="w-5 h-5" /></button>
            </div>
            <div className="p-4">
              <div className="grid grid-cols-7 gap-1 mb-2 text-center text-amber-900/40 text-xs font-black uppercase">{['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}</div>
              <div className="grid grid-cols-7 gap-1 text-center font-black">
                {days.map((d, i) => (
                  <div key={i} className="aspect-square flex items-center justify-center font-black">
                    {d && <button type="button" onClick={() => { onSelect(`${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`); onClose(); }} className={`w-10 h-10 rounded-xl font-black text-lg transition-all flex items-center justify-center cursor-pointer ${isSelected(d) ? 'bg-amber-900 text-white shadow-md scale-105' : isToday(d) ? 'bg-amber-100 text-amber-900 border border-amber-900/20' : 'text-amber-900 hover:bg-amber-50'}`}>{d}</button>}
                  </div>
                ))}
              </div>
            </div>
            <div className="text-center pb-4"><button type="button" onClick={onClose} className="text-amber-900/50 text-xs font-black uppercase tracking-widest hover:text-amber-900 cursor-pointer">關閉月曆</button></div>
          </div>
        </React.Fragment>
      );
    };

    const App = () => {
      const [authStatus, setAuthStatus] = React.useState('loading'); 
      const [apiToken, setApiToken] = React.useState("");
      
      const apiUrl = 'https://script.google.com/macros/s/AKfycbylZOr-mY4m822xXNBZgp7uAaeJ_6eT-ZxwZYc9YGNdweiyz5x7l0U8ekSaY9_9MVrP/exec';

      React.useEffect(() => {
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) {
          setAuthStatus('denied');
          return;
        }

        setAuthStatus('loading');
        let isFinalized = false;
        
        window.onVerifyResult = (res) => {
          if (isFinalized) return;
          isFinalized = true;
          
          if (res && res.auth === 'OK') {
            setApiToken(id.trim());
            setTimeout(() => setAuthStatus('authorized'), 100);
          } else {
            setAuthStatus('denied');
          }
          cleanup();
        };

        const cleanup = () => {
          const s = document.getElementById('v-script');
          if (s) s.remove();
        };

        const timeoutId = setTimeout(() => {
          if (!isFinalized) {
            isFinalized = true;
            setAuthStatus('denied');
            cleanup();
          }
        }, 5000);

        const script = document.createElement('script');
        script.id = 'v-script';
        script.src = `${apiUrl}?action=verify&id=${encodeURIComponent(id.trim())}&callback=onVerifyResult&_t=${Date.now()}`;
        script.onerror = () => {
          if (isFinalized) return;
          isFinalized = true;
          setAuthStatus('denied');
          cleanup();
        };
        document.body.appendChild(script);

        return () => {
          clearTimeout(timeoutId);
          delete window.onVerifyResult;
        };
      }, []);

      const getTodayString = () => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; };
      const [fullDate, setFullDate] = React.useState(getTodayString());
      const [showCalendar, setShowCalendar] = React.useState(false);
      const [formData, setFormData] = React.useState({ user: '', category: '', cup: 1, volume: 330, note: '' });
      const [status, setStatus] = React.useState('idle');
      const successRef = React.useRef(null);
      
      const drinkTypes = [
        { name: "啤酒", emoji: "🍺", defaultVol: 330 },
        { name: "沙瓦", emoji: "🍹", defaultVol: 330 },
        { name: "葡萄酒", emoji: "🍷", defaultVol: 100 },
        { name: "水果酒", emoji: "🥃", defaultVol: 100 },
        { name: "清酒", emoji: "🍶", defaultVol: 50 },
        { name: "其他", emoji: "✨", defaultVol: 100 }
      ];
      
      const volumePresets = [50, 100, 330, 500];
      const totalVolume = Math.round((Number(formData.cup) * Number(formData.volume)) * 10) / 10;

      React.useEffect(() => { if (status === 'success' && successRef.current) successRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, [status]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.category || !formData.user) return;
        setStatus('loading');
        const dateParts = fullDate.split('-'); 
        const payload = {
          timestamp: new Intl.DateTimeFormat('zh-TW', { year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(new Date()),
          yearMonth: `${dateParts[0]}/${dateParts[1]}`, 
          day: dateParts[2], 
          category: formData.category,
          user: formData.user,
          cup: formData.cup,
          volume: formData.volume,
          total: totalVolume,
          note: formData.note,
          api_token: apiToken 
        };

        try {
          await fetch(apiUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload), keepalive: true });
          setStatus('success');
          setFormData({ user: '', category: '', cup: 1, volume: 330, note: '' });
          setFullDate(getTodayString());
        } catch (error) { setStatus('error'); }
      };

      const adjustCup = (val) => setFormData(p => ({ ...p, cup: Math.max(0, Math.round((p.cup + val) * 10) / 10) }));
      const adjustVolume = (val) => setFormData(p => ({ ...p, volume: Math.max(0, Number(p.volume) + val) }));
      const handleCategorySelect = (drink) => setFormData(p => ({ ...p, category: drink.name, volume: drink.defaultVol }));

      if (authStatus === 'loading') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 text-amber-900 font-black px-10 text-center">
            <div className="space-y-6">
              <Icon name="Loader" className="w-16 h-16 mx-auto text-amber-500" />
              <div className="space-y-2">
                <p className="tracking-[0.2em] uppercase italic text-xl font-black">正在安全驗證中...</p>
                <p className="text-xs text-slate-400 font-medium tracking-widest">正在連線至 Google 伺服器</p>
              </div>
            </div>
          </div>
        );
      }

      if (authStatus === 'denied') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-400 font-black p-10">
            <div className="text-center space-y-8 max-w-sm">
              <div className="text-8xl">🚧</div>
              <div>
                <p className="tracking-[0.3em] uppercase italic text-sm mb-2 font-black text-slate-500">System Under Maintenance</p>
                <p className="text-[10px] opacity-50 tracking-widest font-mono font-black uppercase">請確認網址末端 ID 是否正確</p>
              </div>
             </div>
          </div>
        );
      }

      if (status === 'success') {
        return (
          <div className="relative min-h-screen z-10 flex items-center justify-center p-4 pb-20 text-center text-amber-950 font-black">
            <BubbleBg />
            <div ref={successRef} className="glass-card rounded-[3rem] p-10 text-center shadow-2xl animate-in zoom-in duration-300 border-b-8 border-green-500 w-full max-w-md">
              <div className="bg-green-500 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl"><Icon name="Check" className="w-12 h-12 text-white" /></div>
              <h2 className="text-3xl font-black mb-3 text-balance uppercase tracking-tight">紀錄成功！</h2>
              <p className="text-amber-900 font-medium mb-10 text-balance leading-relaxed">紀錄已同步至您的筆記本。<br />祝您有個美好的微醺時光。</p>
              <button onClick={() => setStatus('idle')} className="w-full py-5 bg-amber-900 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 hover:bg-black text-amber-50 cursor-pointer">再來一杯 🥂</button>
            </div>
          </div>
        );
      }

      return (
        <div className="relative min-h-screen z-10 pb-32 font-black">
          <BubbleBg />
          <div className="max-w-md mx-auto px-5 py-10 relative z-20 font-black">
            <div className="text-center mb-10 animate-[float_5s_ease-in-out_infinite]">
              <h1 className="text-4xl font-black text-amber-500 tracking-tighter mb-1 uppercase italic text-balance font-black">HAPPYDRINK</h1>
              <p className="text-amber-900 text-sm font-bold tracking-widest uppercase italic">Every bubble counts</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-6">
              <section className={`glass-card rounded-[2.5rem] p-6 shadow-sm border-2 border-transparent text-center relative font-black ${showCalendar ? 'z-[50]' : 'z-20'}`}>
                <label className="text-[14px] font-black text-amber-900 tracking-widest mb-4 flex items-center justify-center"><Icon name="Calendar" className="w-4 h-4 mr-2 text-amber-900" /> 享受日期 <span className="text-red-600 ml-1 font-black font-black font-black">*</span></label>
                <button type="button" onClick={() => setShowCalendar(true)} className="w-full p-4 bg-amber-50/50 rounded-2xl border-2 border-amber-100 text-amber-900 font-black outline-none text-xl shadow-inner text-center calendar-btn cursor-pointer">{fullDate.replace(/-/g, ' / ')}</button>
                {showCalendar && <CustomCalendar selectedDate={fullDate} onSelect={setFullDate} onClose={() => setShowCalendar(false)} />}
              </section>
              <section className="glass-card rounded-[2.5rem] p-6 shadow-sm border-2 border-transparent text-center font-black">
                <label className="text-[14px] font-black text-amber-900 tracking-widest mb-4 flex items-center justify-center"><Icon name="User" className="w-4 h-4 mr-2 text-amber-900" /> 誰喝酒!! <span className="text-red-600 ml-1 font-black font-black font-black">*</span></label>
                <div className="grid grid-cols-2 gap-4 font-black">
                  {["庭", "珊"].map(u => ( <button key={u} type="button" onClick={() => setFormData(p => ({ ...p, user: u }))} className={`user-card relative py-4 rounded-2xl overflow-hidden flex items-center justify-center font-black text-xl border-2 transition-all active:scale-95 cursor-pointer ${formData.user === u ? 'active' : 'glass-card bg-amber-50/50 border-amber-100 text-amber-900'}`}>{u}</button> ))}
                </div>
              </section>
              <div className="grid grid-cols-2 gap-4 font-black">
                {drinkTypes.map(d => ( 
                  <button key={d.name} type="button" onClick={() => handleCategorySelect(d)} className={`drink-card relative h-36 rounded-[2.5rem] overflow-hidden flex flex-col items-center justify-center space-y-2 border-2 border-transparent cursor-pointer ${formData.category === d.name ? 'active' : 'bg-white/40 opacity-90 shadow-sm'}`}>
                    <div className="flex items-center justify-center h-16 font-black font-black">
                      {typeof d.emoji === 'string' ? <span className="text-6xl font-black">{d.emoji}</span> : d.emoji}
                    </div>
                    <span className={`text-[14px] font-black tracking-wider ${formData.category === d.name ? 'text-amber-950' : 'text-amber-900'}`}>{d.name}</span>
                  </button> 
                ))}
              </div>
              <div className="glass-card rounded-[2.5rem] p-6 shadow-inner text-center flex flex-col items-center font-black">
                <label className="text-[14px] font-black text-amber-900 tracking-widest block mb-4 italic">喝了多少 (杯)</label>
                <div className="w-full max-w-[310px] flex items-center justify-between glass-card bg-white/40 p-2 px-4 rounded-3xl border-2 border-amber-100 min-w-0 font-black">
                  <button type="button" onClick={() => adjustCup(-1)} className="w-11 h-11 rounded-2xl bg-amber-100 flex items-center justify-center text-amber-950 active:scale-90 transition-transform shadow-sm flex-shrink-0 cursor-pointer font-black"><Icon name="Minus" className="w-4 h-4"/></button>
                  <div className="text-5xl font-mono font-black text-amber-950 px-2 tracking-tighter leading-none">{formData.cup}</div>
                  <button type="button" onClick={() => adjustCup(1)} className="w-11 h-11 rounded-2xl bg-amber-950 flex items-center justify-center text-white active:scale-90 transition-transform shadow-md flex-shrink-0 cursor-pointer font-black font-black"><Icon name="Plus" className="w-4 h-4"/></button>
                </div>
              </div>
              <div className="glass-card rounded-[2.5rem] p-6 shadow-inner flex flex-col items-center font-black">
                <label className="text-[14px] font-black text-amber-900 tracking-widest block mb-6">每杯體積 (ml)</label>
                <div className="flex flex-col w-full items-center gap-6 font-black">
                  <div className="w-full max-w-[310px] flex items-center justify-between glass-card bg-white/40 p-2 px-4 rounded-3xl border-2 border-amber-100 min-w-0 font-black">
                    <button type="button" onClick={() => adjustVolume(-10)} className="w-11 h-11 rounded-2xl bg-amber-100 flex items-center justify-center text-amber-950 active:scale-90 transition-transform shadow-sm flex-shrink-0 cursor-pointer font-black"><Icon name="Minus" className="w-4 h-4"/></button>
                    <div className="text-5xl font-mono font-black text-amber-950 px-2 tracking-tight leading-none font-black font-black">{formData.volume}</div>
                    <button type="button" onClick={() => adjustVolume(10)} className="w-11 h-11 rounded-2xl bg-amber-600 flex items-center justify-center text-white active:scale-90 transition-transform shadow-md shadow-amber-200 flex-shrink-0 cursor-pointer font-black"><Icon name="Plus" className="w-4 h-4"/></button>
                  </div>
                  <div className="grid grid-cols-4 gap-2 w-full font-black">
                    {volumePresets.map(v => ( <button key={v} type="button" onClick={() => setFormData(p => ({ ...p, volume: v }))} className={`py-3 rounded-xl text-[14px] font-black transition-all cursor-pointer ${Number(formData.volume) === v ? 'bg-amber-950 text-white shadow-md' : 'bg-white/50 text-amber-900 hover:bg-white/80'}`}>{v}ml</button> ))}
                  </div>
                </div>
              </div>
              <div className="glass-card rounded-[2.5rem] p-8 shadow-inner flex flex-col items-center relative overflow-hidden border-2 border-amber-100/50 font-black font-black">
                 <div className="absolute top-0 right-0 p-4 opacity-5 rotate-12 text-4xl pointer-events-none">✒️</div>
                 <span className="text-[11px] font-black uppercase tracking-[0.5em] text-amber-900/40 mb-2 font-black">ADDITIONAL NOTES</span>
                 <input type="text" value={formData.note} onChange={(e) => setFormData(p => ({ ...p, note: e.target.value }))} placeholder="..." className="w-full bg-transparent text-center text-xl font-bold text-amber-950 placeholder:text-amber-900/20 outline-none font-black" />
              </div>
              <div className="bg-amber-950 rounded-[2.5rem] p-8 text-white shadow-2xl flex flex-col items-center relative overflow-hidden font-black">
                 <div className="absolute top-0 right-0 p-4 opacity-10 rotate-12 text-4xl">🥂</div>
                 <span className="text-[11px] font-black uppercase tracking-[0.5em] opacity-40 mb-1 text-amber-500 font-black font-black font-black font-black font-black">TOTAL CONSUMPTION</span>
                 <div className="text-6xl font-mono font-black tracking-tighter text-amber-50 font-black font-black">{totalVolume} <span className="text-xl font-bold opacity-40 ml-1">ml</span></div>
              </div>
              <button type="submit" disabled={status === 'loading' || !formData.category || !formData.user} className={`w-full py-6 rounded-full font-black text-2xl shadow-2xl transition-all active:scale-95 flex items-center justify-center space-x-4 cursor-pointer font-black ${status === 'loading' ? 'bg-amber-200 text-amber-400 cursor-not-allowed' : 'bg-gradient-to-r from-amber-500 to-orange-600 text-white font-black'}`}>{status === 'loading' ? <Icon name="Loader" className="w-8 h-8 text-amber-900" /> : <span className="tracking-[0.2em] font-black uppercase italic text-amber-50 font-black font-black">乾杯!</span>}</button>
            </form>
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
